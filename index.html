<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO 최적화 메타 태그 -->
    <title>나의 귀여운 블로그 | 일상의 소중한 기록</title>
    <meta name="description" content="소소하고 귀여운 일상을 기록하는 포비의 개인 블로그입니다. 일상, 공부, 여행 이야기를 만나보세요.">
    <meta name="keywords" content="블로그, 일상기록, 귀여운블로그, 포비로그, 일상, 공부, 여행">
    <meta property="og:title" content="나의 귀여운 블로그">
    <meta property="og:description" content="소소하고 귀여운 일상의 이야기들을 기록합니다.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://your-blog-url.com">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffb7b2; /* 파스텔 핑크 */
            --secondary-color: #ffdac1; /* 파스텔 오렌지 */
            --accent-color: #baffc9; /* 파스텔 그린 */
            --text-color: #555;
            --bg-color: #fff9f9;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
            --danger-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, .logo {
            font-family: 'Gaegu', cursive;
        }

        /* Navigation */
        nav {
            background: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 2rem;
            color: var(--primary-color);
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: color 0.3s;
            cursor: pointer;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        /* Hero Section */
        header.hero {
            height: 300px;
            background: linear-gradient(rgba(255,183,178,0.3), rgba(255,218,193,0.3)), 
                        url('https://images.unsplash.com/photo-1516550893923-42d28e5677af?ixlib=rb-1.2.1&auto=format&fit=crop&w=1352&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #444;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px var(--white);
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 50px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            .hero h1 { font-size: 2.5rem; }
        }

        /* Search Section */
        .search-box {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .search-input-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .search-engines {
            display: flex;
            justify-content: space-around;
            gap: 5px;
        }

        .search-engines button {
            flex: 1;
            font-size: 0.8rem;
            padding: 8px 5px;
        }

        /* Post Cards */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-card h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .post-meta {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        .admin-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 5px;
        }

        .btn-mini {
            padding: 4px 8px;
            font-size: 0.7rem;
            border-radius: 5px;
        }

        .btn-delete { background: var(--danger-color); color: white; }

        /* Tag hidden per request */
        .tag {
            display: none !important;
        }

        /* Sidebar */
        aside {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-box {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .sidebar-box h3 {
            margin-bottom: 15px;
            border-bottom: 2px solid var(--secondary-color);
            display: inline-block;
        }

        .category-list {
            list-style: none;
        }

        .category-list li {
            padding: 5px 0;
            cursor: pointer;
            transition: padding-left 0.3s;
        }

        .category-list li:hover {
            padding-left: 10px;
            color: var(--primary-color);
        }

        /* Write Form */
        #write-section {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: var(--secondary-color); color: var(--text-color); }
        .btn-accent { background: var(--accent-color); color: var(--text-color); }

        /* Guestbook */
        #guestbook-section {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .guestbook-item {
            border-bottom: 1px dashed #eee;
            padding: 15px 0;
        }

    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showSection('home')">포비로그 🐾</div>
        <div class="nav-links">
            <a onclick="showSection('home')">홈</a>
            <a onclick="adminCheck('write')">글쓰기</a>
            <a onclick="showSection('guestbook')">방명록</a>
        </div>
    </nav>

    <header id="home-hero" class="hero">
        <h1>오늘의 기록들</h1>
        <p>소소하고 귀여운 일상의 이야기</p>
    </header>

    <div class="container">
        <!-- 메인 콘텐츠 영역 -->
        <main>
            <!-- 블로그 리스트 섹션 -->
            <section id="home-section" class="post-list">
                <article class="post-card" id="post-initial">
                    <div class="admin-controls">
                        <button class="btn-mini btn-secondary" onclick="editPost('post-initial')">수정</button>
                        <button class="btn-mini btn-delete" onclick="deletePost('post-initial')">삭제</button>
                    </div>
                    <header>
                        <div class="post-meta">2024.05.20 | 일상</div>
                        <h2 class="title">어서오세요! 첫 번째 글입니다.</h2>
                    </header>
                    <p class="content">이곳은 귀엽고 심플한 블로그입니다. 오른쪽 사이드바에서 카테고리를 확인하거나 상단 메뉴에서 직접 글을 써보세요!</p>
                </article>
                <!-- 글이 추가될 위치 -->
            </section>

            <!-- 글쓰기 섹션 -->
            <section id="write-section">
                <h2 id="write-title">새 글 작성하기 ✨</h2>
                <input type="hidden" id="edit-id" value="">
                <div class="form-group">
                    <label for="post-title">제목 (h2)</label>
                    <input type="text" id="post-title" placeholder="제목을 입력하세요">
                </div>
                <div class="form-group">
                    <label for="post-category">카테고리</label>
                    <select id="post-category">
                        <option value="일상">일상</option>
                        <option value="공부">공부</option>
                        <option value="여행">여행</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="post-content">내용</label>
                    <textarea id="post-content" rows="10" placeholder="내용을 입력하세요."></textarea>
                </div>
                <div class="form-group">
                    <label for="post-image">이미지 URL (선택)</label>
                    <input type="text" id="post-image" placeholder="https://example.com/image.jpg">
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="savePost()">저장하기</button>
                    <button class="btn-secondary" onclick="showSection('home')">취소</button>
                </div>
            </section>

            <!-- 방명록 섹션 -->
            <section id="guestbook-section">
                <h2>방명록 💌</h2>
                <div class="form-group">
                    <textarea id="guest-msg" rows="3" placeholder="남길 메시지를 적어주세요!"></textarea>
                </div>
                <button class="btn-accent" onclick="addGuestMsg()">남기기</button>
                <div id="guestbook-list" style="margin-top:30px;">
                    <div class="guestbook-item">
                        <strong>포비:</strong> 반가워요! 자주 놀러오세요.
                    </div>
                </div>
            </section>
        </main>

        <!-- 사이드바 -->
        <aside>
            <!-- 통합 검색창 -->
            <div class="sidebar-box search-box">
                <h3>외부 검색</h3>
                <div class="search-input-group">
                    <input type="text" id="external-search-query" placeholder="검색어를 입력하세요">
                </div>
                <div class="search-engines">
                    <button class="btn-primary" onclick="externalSearch('google')">Google</button>
                    <button class="btn-secondary" onclick="externalSearch('naver')">Naver</button>
                    <button class="btn-accent" onclick="externalSearch('daum')">Daum</button>
                </div>
            </div>

            <div class="sidebar-box">
                <h3>카테고리</h3>
                <ul class="category-list">
                    <li onclick="filterCategory('일상')">일상</li>
                    <li onclick="filterCategory('공부')">공부</li>
                    <li onclick="filterCategory('여행')">여행</li>
                </ul>
            </div>
        </aside>
    </div>

    <script>
        // 관리자 비밀번호 (데모용)
        const ADMIN_PW = "04070036";

        // 관리자 확인 함수
        function adminCheck(targetAction, data) {
            const input = prompt("관리자 비밀번호를 입력하세요:");
            if (input === ADMIN_PW) {
                if (targetAction === 'write') showSection('write');
                return true;
            } else {
                alert("비밀번호가 틀렸습니다!");
                return false;
            }
        }

        // 섹션 전환 함수
        function showSection(section) {
            const home = document.getElementById('home-section');
            const write = document.getElementById('write-section');
            const guest = document.getElementById('guestbook-section');
            const hero = document.getElementById('home-hero');

            // 초기화
            document.getElementById('edit-id').value = "";
            document.getElementById('write-title').innerText = "새 글 작성하기 ✨";

            home.style.display = 'none';
            write.style.display = 'none';
            guest.style.display = 'none';
            hero.style.display = 'none';

            if (section === 'home') {
                home.style.display = 'flex';
                hero.style.display = 'flex';
            } else if (section === 'write') {
                write.style.display = 'block';
            } else if (section === 'guestbook') {
                guest.style.display = 'block';
            }
        }

        // 외부 검색 기능
        function externalSearch(engine) {
            const query = document.getElementById('external-search-query').value;
            if(!query) {
                alert('검색어를 입력해주세요!');
                return;
            }

            let url = '';
            switch(engine) {
                case 'google': url = `https://www.google.com/search?q=${encodeURIComponent(query)}`; break;
                case 'naver': url = `https://search.naver.com/search.naver?query=${encodeURIComponent(query)}`; break;
                case 'daum': url = `https://search.daum.net/search?q=${encodeURIComponent(query)}`; break;
            }
            window.open(url, '_blank');
        }

        // 글 저장 기능 (In-memory)
        function savePost() {
            const title = document.getElementById('post-title').value;
            const category = document.getElementById('post-category').value;
            const content = document.getElementById('post-content').value;
            const image = document.getElementById('post-image').value;
            const editId = document.getElementById('edit-id').value;

            if(!title || !content) {
                alert('제목과 내용을 입력해주세요!');
                return;
            }

            if (editId) {
                // 수정 모드
                const article = document.getElementById(editId);
                article.querySelector('.title').innerText = title;
                article.querySelector('.content').innerHTML = content.replace(/\n/g, '<br>');
                const existingImg = article.querySelector('.post-img');
                if (image) {
                    if (existingImg) existingImg.src = image;
                    else {
                        const newImg = document.createElement('img');
                        newImg.src = image;
                        newImg.className = 'post-img';
                        newImg.style = "width:100%; border-radius:15px; margin:15px 0;";
                        article.appendChild(newImg);
                    }
                } else if (existingImg) {
                    existingImg.remove();
                }
            } else {
                // 신규 작성
                const postList = document.getElementById('home-section');
                const date = new Date().toLocaleDateString();
                const newId = 'post-' + Date.now();

                const article = document.createElement('article');
                article.className = 'post-card';
                article.id = newId;
                
                let imgHtml = image ? `<img src="${image}" class="post-img" alt="${title}" style="width:100%; border-radius:15px; margin:15px 0;">` : '';
                
                article.innerHTML = `
                    <div class="admin-controls">
                        <button class="btn-mini btn-secondary" onclick="editPost('${newId}')">수정</button>
                        <button class="btn-mini btn-delete" onclick="deletePost('${newId}')">삭제</button>
                    </div>
                    <header>
                        <div class="post-meta">${date} | ${category}</div>
                        <h2 class="title">${title}</h2>
                    </header>
                    <div class="entry-content content">
                        ${content.replace(/\n/g, '<br>')}
                    </div>
                    ${imgHtml}
                `;
                postList.prepend(article);
            }
            
            // 초기화
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-image').value = '';
            
            alert('완료되었습니다!');
            showSection('home');
        }

        // 수정 기능
        function editPost(id) {
            if (!adminCheck()) return;
            
            const article = document.getElementById(id);
            const title = article.querySelector('.title').innerText;
            const content = article.querySelector('.content').innerHTML.replace(/<br>/g, '\n');
            const img = article.querySelector('.post-img');

            showSection('write');
            document.getElementById('write-title').innerText = "게시글 수정하기 ✏️";
            document.getElementById('edit-id').value = id;
            document.getElementById('post-title').value = title;
            document.getElementById('post-content').value = content;
            if (img) document.getElementById('post-image').value = img.src;
        }

        // 삭제 기능
        function deletePost(id) {
            if (!adminCheck()) return;
            if (confirm("정말로 이 글을 삭제할까요?")) {
                document.getElementById(id).remove();
            }
        }

        // 방명록 추가 (누구나 가능)
        function addGuestMsg() {
            const msg = document.getElementById('guest-msg').value;
            if(!msg) return;

            const list = document.getElementById('guestbook-list');
            const item = document.createElement('div');
            item.className = 'guestbook-item';
            item.innerHTML = `<strong>방문자:</strong> ${msg}`;
            
            list.prepend(item);
            document.getElementById('guest-msg').value = '';
        }

        function filterCategory(name) {
            alert(name + ' 카테고리 필터 기능입니다.');
        }
    </script>
</body>
</html>
